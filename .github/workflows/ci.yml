name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-test-native:
    name: ${{ matrix.rid }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
            executable: DevCleaner.exe
            package_executable: devcleaner.exe
            smoke_args: ""
          - runner: macos-latest
            rid: osx-arm64
            executable: DevCleaner
            package_executable: devcleaner
            smoke_args: ""
          - runner: ubuntu-24.04
            rid: linux-x64
            executable: DevCleaner
            package_executable: devcleaner
            smoke_args: -RequireLinuxBaseline
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore once
        run: dotnet restore DevCleaner.slnx -r "${{ matrix.rid }}"

      - name: Build with warnings as errors
        run: dotnet build DevCleaner.slnx --no-restore -warnaserror

      - name: Test
        run: dotnet test DevCleaner.slnx --no-build

      - name: Publish host Native AOT executable
        run: >-
          dotnet publish src/DevCleaner/DevCleaner.csproj
          -c Release
          -r "${{ matrix.rid }}"
          --self-contained
          --no-restore
          -p:PublishAot=true
          -o "artifacts/native/${{ matrix.rid }}"

      - name: Prepare packaged executable
        env:
          RID: ${{ matrix.rid }}
          EXECUTABLE: ${{ matrix.executable }}
          PACKAGE_EXECUTABLE: ${{ matrix.package_executable }}
        run: |
          package="artifacts/package/devcleaner-${RID}"
          mkdir -p "$package"
          cp "artifacts/native/${RID}/${EXECUTABLE}" "$package/${PACKAGE_EXECUTABLE}"
          cp LICENSE README.md "$package/"

      - name: Smoke-test packaged executable
        run: >-
          pwsh -NoProfile -File eng/native-smoke.ps1
          -ExecutablePath "artifacts/package/devcleaner-${{ matrix.rid }}/${{ matrix.package_executable }}"
          ${{ matrix.smoke_args }}
